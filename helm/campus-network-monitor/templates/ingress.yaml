{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "cnm.fullname" . }}-ingress
spec:
  rules:
{{- range .Values.ingress.hosts }}
    - host: {{ .host }}
      http:
        paths:
{{- range .paths }}
          - path: {{ . }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "cnm.fullname" $. }}-frontend
                port:
                  number: {{ $.Values.frontend.service.port }}
{{- end }}
{{- end }}
{{- end }}
